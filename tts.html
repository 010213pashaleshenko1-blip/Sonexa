<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#151515" />
  <title>Sonexa — TTS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <nav class="navbar">
      <div class="navbar-content">
        <div class="navbar-top">
          <button id="menu-toggle" class="menu-toggle" aria-label="Открыть меню" aria-expanded="false" type="button">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="logo-section">
            <div class="logo-mark" aria-hidden="true">
              <svg class="icon icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3c1.7 0 3.3.5 4.5 1.5" />
                <path d="M7 6.5A8 8 0 0 1 12 5" />
                <path d="M5 12a7 7 0 0 1 14 0" />
                <path d="M7 17.5A8 8 0 0 0 12 19" />
                <path d="M12 21c-1.7 0-3.3-.5-4.5-1.5" />
              </svg>
            </div>
            <div class="brand-text">
              <div class="logo">Sonexa</div>
              <span class="beta-badge">БЕТА</span>
            </div>
          </div>
        </div>

        <div id="nav-drawer" class="nav-drawer" aria-hidden="true">
          <div class="nav-group">
            <div class="nav-group-title">Страницы</div>
            <a class="nav-link" href="index.html">
              <span class="icon icon-sm" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 10.5 12 3l9 7.5" />
                  <path d="M5 10v10h14V10" />
                </svg>
              </span>
              <span>Главная</span>
            </a>
            <a class="nav-link" href="index.html?page=about">
              <span class="icon icon-sm" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="9" />
                  <path d="M12 11v5" />
                  <path d="M12 8h.01" />
                </svg>
              </span>
              <span>О проекте</span>
            </a>
            <a class="nav-link is-active" href="tts.html">
              <span class="icon icon-sm" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="16" rx="4" />
                  <path d="M7 9h10" />
                  <path d="M7 13h6" />
                </svg>
              </span>
              <span>TTS</span>
            </a>
          </div>
          <div class="nav-group">
            <div class="nav-group-title">Сервисы</div>
            <button class="nav-link nav-btn is-disabled" type="button" disabled>
              <span class="icon icon-sm" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3Z" />
                  <path d="M19 11a7 7 0 0 1-14 0" />
                  <path d="M12 18v4" />
                </svg>
              </span>
              <span>STT</span>
              <span class="coming-soon">Скоро</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div id="overlay" class="overlay" aria-hidden="true"></div>

    <main class="main-container">
      <section class="service-shell">
        <div class="service-head">
          <div>
            <div class="service-kicker">TTS endpoint</div>
            <h1 class="service-title">Text to Speech</h1>
            <p class="service-subtitle">Отдельная страница для озвучки текста. Запрос уходит в <code>/api/tts</code>.</p>
          </div>
          <div class="service-badge">/api/tts</div>
        </div>

        <div class="panel" id="tts-panel">
          <div class="panel-grid">
            <div class="column">
              <div class="form-group">
                <label class="form-label" for="text">Твой текст</label>
                <textarea id="text" class="text-input" placeholder="Введи текст, который нужно озвучить..." maxlength="2000"></textarea>
                <div class="char-count"><span id="char-count">0</span> / 2000</div>
              </div>

              <div class="form-group">
                <label class="form-label" for="voice">Голос</label>
                <select id="voice" class="voice-select">
                  <optgroup label="Женские голоса">
                    <option value="serena">Серена - Тёплый и дружелюбный</option>
                    <option value="ono_anna">Анна - Мягкий и нежный</option>
                    <option value="sohee">Софи - Энергичный и ясный</option>
                    <option value="vivian">Виктория - Профессиональный тон</option>
                  </optgroup>
                  <optgroup label="Мужские голоса">
                    <option value="ryan">Райан - Профессиональный</option>
                    <option value="aiden">Эйден - Нейтральный и ясный</option>
                    <option value="dylan">Дилан - Непринужденный тон</option>
                    <option value="eric">Эрик - Формальный и сильный</option>
                    <option value="uncle_fu">Дядя Фу - Рассказчик</option>
                  </optgroup>
                </select>
              </div>

              <button id="generate" class="btn btn-primary btn-large" type="button">
                <span class="icon icon-sm" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3v18" />
                    <path d="M5 10l7-7 7 7" />
                  </svg>
                </span>
                <span class="btn-text">Создать речь</span>
                <span class="btn-arrow" aria-hidden="true">→</span>
              </button>
            </div>

            <div class="column">
              <div id="status-section" class="status-section">
                <div id="status" class="status idle">
                  <span class="status-icon">✓</span>
                  <div class="status-content">
                    <div class="status-title">Готово</div>
                    <div class="status-message">Введи текст и нажми кнопку, чтобы создать речь</div>
                  </div>
                </div>
              </div>

              <div id="player-section" class="player-section" style="display: none;">
                <div class="player-header">
                  <h3 class="player-title">
                    <span class="icon icon-sm" aria-hidden="true">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12a7 7 0 0 1 14 0" />
                        <path d="M8 12a4 4 0 0 1 8 0" />
                        <path d="M12 12v7" />
                      </svg>
                    </span>
                    Результат
                  </h3>
                  <button id="clear-btn" class="btn-icon-only" title="Закрыть плеер" aria-label="Закрыть плеер" type="button">
                    <span class="icon icon-sm" aria-hidden="true">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                      </svg>
                    </span>
                  </button>
                </div>
                <audio id="audio" controls class="audio-player"></audio>
                <div class="player-actions">
                  <button id="download-btn" class="btn btn-secondary" type="button">
                    <span class="icon icon-sm" aria-hidden="true">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3v12" />
                        <path d="m8 11 4 4 4-4" />
                        <path d="M5 19h14" />
                      </svg>
                    </span>
                    Скачать
                  </button>
                  <button id="copy-url-btn" class="btn btn-secondary" type="button">
                    <span class="icon icon-sm" aria-hidden="true">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="11" height="11" rx="2" />
                        <path d="M5 15V5a2 2 0 0 1 2-2h10" />
                      </svg>
                    </span>
                    Копировать ссылку
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <p>&copy; 2026 Sonexa Inc. Создано с ❤️ в России.</p>
      </div>
    </footer>
  </div>

  <script src="/src/app.js"></script>
</body>
</html>
