<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sonexa</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="container">
    <header class="hero">
      <div class="badge">SONEXA</div>
      <h1>AI Voice Service</h1>
      <p>Text-to-Speech сейчас, Speech-to-Text — скоро.</p>
    </header>

    <section class="tabs">
      <button class="tab active">TTS</button>
      <button class="tab disabled" disabled>STT (Скоро)</button>
    </section>

    <section class="card">
      <label class="field-label" for="text">Текст</label>
      <textarea id="text" placeholder="Введите текст для озвучки..."></textarea>

      <label class="field-label" for="voice">Голос</label>
      <select id="voice">
        <option value="serena">serena</option>
        <option value="ryan">ryan</option>
        <option value="aiden">aiden</option>
        <option value="dylan">dylan</option>
        <option value="eric">eric</option>
        <option value="ono_anna">ono_anna</option>
        <option value="sohee">sohee</option>
        <option value="uncle_fu">uncle_fu</option>
        <option value="vivian">vivian</option>
      </select>

      <button id="generate" class="primary-btn">Сгенерировать</button>

      <div id="status" class="status">Готов к генерации.</div>

      <div class="player-wrap">
        <audio id="audio" controls></audio>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
